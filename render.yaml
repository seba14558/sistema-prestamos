services:
  # PostgreSQL Database
  - type: pserv
    name: sistema-prestamos-db
    plan: free
    region: oregon

  # Backend API
  - type: web
    name: sistema-prestamos-backend
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: sistema-prestamos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Frontend
  - type: web
    name: sistema-prestamos-frontend
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./frontend/Dockerfile.production
    dockerContext: ./frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://sistema-prestamos-backend.onrender.com/api
